placed_features:
  default:ender_pearl_flower:
    dimension_type:
      - minecraft:the_end
    feature:
        type: 'minecraft:simple_block'
        config:
          to_place:
            type: 'minecraft:rule_based_state_provider'
            rules:
              - if_true:
                  type: 'minecraft:all_of'
                  predicates:
                    - type: 'minecraft:matching_blocks'
                      blocks: 'minecraft:air'
                    - type: 'minecraft:matching_blocks'
                      blocks: 'minecraft:end_stone'
                      offset:
                        - 0
                        - -1
                        - 0
                then:
                  type: 'minecraft:weighted_state_provider'
                  entries:
                    - weight: 4
                      data:
                        Name: 'default:ender_pearl_flower'
                        Properties:
                          age: '0'
                    - weight: 2
                      data:
                        Name: 'default:ender_pearl_flower'
                        Properties:
                          age: '1'
                    - weight: 1
                      data:
                        Name: 'default:ender_pearl_flower'
                        Properties:
                          age: '2'
    placement:
      - type: 'minecraft:in_square'
      - type: 'minecraft:rarity_filter'
        chance: 24
      - type: 'minecraft:height_range'
        height:
          type: 'minecraft:uniform'
          min_inclusive:
            absolute: 50
          max_inclusive:
            absolute: 70
      - type: 'minecraft:count'
        count: 96
      - type: 'minecraft:random_offset'
        xz_spread:
          type: 'minecraft:trapezoid'
          max: 7
          min: -7
          plateau: 0
        y_spread:
          type: 'minecraft:trapezoid'
          max: 3
          min: -3
          plateau: 0
  default:fairy_flower:
    dimension_type:
      - minecraft:overworld
    feature:
