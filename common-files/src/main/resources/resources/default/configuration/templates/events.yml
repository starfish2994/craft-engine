templates:
  default:rotatable_block:
    on: right_click
    conditions:
      - type: "!has_item"
      - type: expression
        expression: <arg:player.is_sneaking>
    functions:
      - type: update_interaction_tick
      - type: play_sound
        sound: ${rotate_sound:-'minecraft:block.bamboo.place'}
      - type: swing_hand
      - type: cycle_block_property
        property: facing
        rules:
          north: east
          east: south
          south: west
          west: north
  default:rotatable_furniture_4:
    on: right_click
    conditions:
      - type: "!has_item"
      - type: expression
        expression: <arg:player.is_sneaking>
    functions:
      - type: update_interaction_tick
      - type: rotate_furniture
        degree: 90
        on_success:
          - type: swing_hand
          - type: play_sound
            sound: ${rotate_sound:-'minecraft:block.bamboo.place'}
        on_failure:
          - type: rotate_furniture
            degree: 180
            on_success:
              - type: swing_hand
              - type: play_sound
                sound: ${rotate_sound:-'minecraft:block.bamboo.place'}
            on_failure:
              - type: rotate_furniture
                degree: 270
                on_success:
                  - type: swing_hand
                  - type: play_sound
                    sound: ${rotate_sound:-'minecraft:block.bamboo.place'}
  default:rotatable_furniture_8:
    on: right_click
    conditions:
      - type: expression
        expression: <arg:player.is_sneaking>
      - type: "!has_item"
      - type: "!match_furniture_variant"
        variants: ${blacklist_variants:-null}
    functions:
      - type: update_interaction_tick
      - type: rotate_furniture
        degree: 45
        on_success:
          - type: swing_hand
          - type: play_sound
            sound: ${rotate_sound:-'minecraft:block.bamboo.place'}
        on_failure:
          - type: rotate_furniture
            degree: 90
            on_success:
              - type: swing_hand
              - type: play_sound
                sound: ${rotate_sound:-'minecraft:block.bamboo.place'}
            on_failure:
              - type: rotate_furniture
                degree: 135
                on_success:
                  - type: swing_hand
                  - type: play_sound
                    sound: ${rotate_sound:-'minecraft:block.bamboo.place'}