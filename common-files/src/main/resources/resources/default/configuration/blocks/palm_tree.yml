          model:
            template: default:model/simplified_cube_all
            arguments:
              path: minecraft:block/custom/palm_planks
          auto_state: solid
  default:palm_sapling:
    settings:
      fuel_time: 100
    data:
      item_name: <!i><lang:item.default.palm_sapling>
    texture: minecraft:block/custom/palm_sapling
    behavior:
      type: block_item
      block:
        settings:
          template: default:settings/sapling
        behaviors:
          - type: liquid_flowable_block
          - type: bush_block
            bottom_blocks:
              - minecraft:farmland
            bottom_block_tags:
              - minecraft:dirt
              - minecraft:sand
              - minecraft:supports_vegetation
          - type: sapling_block
            feature: default:palm_tree
            bone_meal_success_chance: 0.45
        loot:
          template: default:loot_table/self
        states:
          properties:
            stage:
              type: int
              default_value: 0
              min: 0
              max: 1
          appearances:
            default:
              auto_state: sapling
              model:
                path: minecraft:block/custom/palm_sapling
                generation:
                  parent: minecraft:block/cross
                  textures:
                    cross: minecraft:block/custom/palm_sapling
  default:palm_leaves:
    material: oak_leaves
    data:
      item_name: <!i><lang:item.default.palm_leaves>
      block_state: default:palm_leaves[persistent=true,waterlogged=false,distance=7]
    model:
      type: minecraft:model
      path: minecraft:item/custom/palm_leaves
      generation:
        parent: minecraft:block/custom/palm_leaves
      tints:
        - type: minecraft:constant
          value: -12012264
    behavior:
      type: block_item
      block:
        behavior:
          type: leaves_block
        loot:
          template: default:loot_table/leaves
          arguments:
            leaves: default:palm_leaves
            sapling: default:palm_sapling
        settings:
          template: default:settings/leaves
        states:
          template: default:block_state/tintable_leaves
          arguments:
            model_path: minecraft:block/custom/palm_leaves
            texture_path: minecraft:block/custom/palm_leaves
  default:palm_trapdoor:
    data:
      item_name: <!i><lang:item.default.palm_trapdoor>
    settings:
      fuel_time: 300
    model: minecraft:block/custom/palm_trapdoor_bottom
    behavior:
      type: block_item
      block:
        behavior:
          type: trapdoor_block
          can_open_with_hand: true
          can_open_by_wind_charge: true
          sounds:
            open: minecraft:block.wooden_trapdoor.open
            close: minecraft:block.wooden_trapdoor.close
        loot:
          template: default:loot_table/self
        settings:
          template:
            - default:sound/wood
          overrides:
            map_color: 2
            instrument: bass
            hardness: 3.0
            resistance: 3.0
            burnable: true
            tags:
              - minecraft:mineable/axe
              - minecraft:trapdoors
        states:
          template: default:block_state/trapdoor
          arguments:
            base_block: acacia_trapdoor
            model_bottom_path: minecraft:block/custom/palm_trapdoor_bottom
            model_bottom_generation:
              parent: minecraft:block/template_orientable_trapdoor_bottom
              textures:
                texture: minecraft:block/custom/palm_trapdoor
            model_open_path: minecraft:block/custom/palm_trapdoor_open
            model_open_generation:
              parent: minecraft:block/template_orientable_trapdoor_open
              textures:
                texture: minecraft:block/custom/palm_trapdoor
            model_top_path: minecraft:block/custom/palm_trapdoor_top
            model_top_generation:
              parent: minecraft:block/template_orientable_trapdoor_top
              textures:
                texture: minecraft:block/custom/palm_trapdoor
  default:palm_door:
