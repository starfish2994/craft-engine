items:
  default:sleeper_sofa:
    $$<=1.21.3:
      material: leather_horse_armor
      client_bound_data:
        overwritable_dyed_color: 130,168,51
    data:
      item_name: <!i><lang:item.default.sofa>
      remove_components:
        - attribute_modifiers
    settings:
      dyeable: true
    model:
      type: minecraft:model
      path: minecraft:item/custom/sleeper_sofa
      tints:
        - type: minecraft:dye
          value: 130,168,51
    behavior:
      type: block_item
      block:
        settings:
          hardness: 0.5
          resistance: 0.5
          map_color: 27
          burn_chance: 5
          fire_spread_chance: 20
          burnable: true
          is_suffocating: false
          is_redstone_conductor: false
          push_reaction: block
          instrument: bass
          support_shape: cobweb
          sounds:
            break: minecraft:block.wood.break
            fall: minecraft:block.wood.fall
            hit: minecraft:block.wood.hit
            place: minecraft:block.wood.place
            step: minecraft:block.wood.step
          tags:
            - minecraft:mineable/axe
        behaviors:
          - type: bouncing_block
            bounce_height: 0.66
            sync_player_position: false
          - type: seat_block
            seats:
              - 0,0,0
          - type: tint_source_block
            drop_item: true
        state:
          state: white_bed[facing=west,occupied=false,part=foot]
          entity_renderer:
            item: default:sleeper_sofa
            tint_source: minecraft:dyed_color
  default:sofa_inner:
    $$<=1.21.3:
      material: leather_horse_armor
      client_bound_data:
        overwritable_dyed_color: 130,168,51
    model:
      type: minecraft:model
      path: minecraft:item/custom/sofa_inner
