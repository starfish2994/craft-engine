items:
  default:fairy_flower:
    data:
      item_name: <!i><lang:item.default.fairy_flower>
    texture: minecraft:item/custom/fairy_flower
    behavior:
      type: block_item
      block:
        settings:
          template:
            - default:hardness/none
            - default:sound/grass
          overrides:
            item: default:fairy_flower
            push_reaction: destroy
            map_color: 19
        behavior:
          - type: liquid_flowable_block
          - type: bush_block
            bottom_blocks:
              - minecraft:farmland
            bottom_block_tags:
              - minecraft:dirt
              - minecraft:supports_vegetation
        loot:
          template: default:loot_table/self
        state:
          auto_state: sugar_cane
          models:
            - path: minecraft:block/custom/fairy_flower_1
              weight: 100
            - path: minecraft:block/custom/fairy_flower_2
              weight: 5
              generation:
                parent: minecraft:block/custom/fairy_flower_1
                textures:
                  '0': minecraft:block/custom/fairy_flower_2
            - path: minecraft:block/custom/fairy_flower_3
              weight: 5
              generation:
                parent: minecraft:block/custom/fairy_flower_1
                textures:
                  '0': minecraft:block/custom/fairy_flower_3
            - path: minecraft:block/custom/fairy_flower_4
              weight: 5
              generation:
                parent: minecraft:block/custom/fairy_flower_1
                textures:
                  '0': minecraft:block/custom/fairy_flower_4
placed_features:
  default:fairy_flower:
    dimension_type:
      - minecraft:overworld
    feature:
      $$>=26.1:
        type: 'minecraft:simple_block'
        config:
          to_place:
            type: 'minecraft:rule_based_state_provider'
            rules:
              - if_true:
                  type: 'minecraft:all_of'
                  predicates:
                    - type: 'minecraft:replaceable'
                    - type: 'minecraft:matching_fluids'
                      fluids: 'minecraft:empty'
                    - type: 'minecraft:matching_blocks'
                      offset:
                        - 0
                        - -1
                        - 0
                      blocks: 'minecraft:grass_block'
                then:
                  type: 'minecraft:simple_state_provider'
                  state:
                    Name: 'default:fairy_flower'
      $$fallback:
        type: 'minecraft:random_patch'
        config:
          feature:
            feature:
              type: 'minecraft:simple_block'
              config:
                to_place:
                  type: 'minecraft:simple_state_provider'
                  state:
                    Name: 'default:fairy_flower'
            placement:
              - type: 'minecraft:block_predicate_filter'
                predicate:
                  type: 'minecraft:all_of'
                  predicates:
                    - type: 'minecraft:replaceable'
                    - type: 'minecraft:matching_fluids'
                      fluids: 'minecraft:empty'
                    - type: 'minecraft:matching_blocks'
                      blocks: 'minecraft:grass_block'
                      offset:
                        - 0
                        - -1
                        - 0
          tries: 64
          xz_spread: 7
          y_spread: 3
    placement:
      $$>=26.1:
        - type: 'minecraft:rarity_filter'
          chance: 100
        - type: 'minecraft:in_square'
        - type: 'minecraft:heightmap'
          heightmap: MOTION_BLOCKING
        - type: 'minecraft:count'
          count: 64
        - type: 'minecraft:random_offset'
          xz_spread:
            type: 'minecraft:trapezoid'
            max: 7
            min: -7
            plateau: 0
          y_spread:
            type: 'minecraft:trapezoid'
            max: 3
            min: -3
            plateau: 0
      $$fallback:
        - type: 'minecraft:rarity_filter'
          chance: 100
        - type: 'minecraft:in_square'
        - type: 'minecraft:heightmap'
          heightmap: MOTION_BLOCKING