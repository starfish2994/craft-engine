items:
  default:drill:
    material: stone_pickaxe
    data:
      item_name: <!i><white><lang:item.default.drill>
      max_damage: 512
    behavior:
      - type: range_mining_item
        range:
          - 0,0,1
          - 0,0,2
    model:
      type: minecraft:condition
      property: "minecraft:selected"
      on_false:
        type: "minecraft:model"
        path: "minecraft:item/custom/drill"
        generation:
          parent: minecraft:item/handheld
          textures:
            layer0: minecraft:item/custom/drill
          display:
            thirdperson_righthand:
              translation: 0,0.5,-2
              rotation: 0,-90,25
              scale: 0.85,0.85,0.85
            thirdperson_lefthand:
              translation: 0,0.5,-2
              rotation: 0,90,-25
              scale: 0.85,0.85,0.85
      on_true:
        type: "minecraft:model"
        path: "minecraft:item/custom/drill_selected"
        generation:
          parent: minecraft:item/handheld
          textures:
            layer0: minecraft:item/custom/drill_selected
          display:
            thirdperson_righthand:
              translation: 0,0.5,-2
              rotation: 0,-90,25
              scale: 0.85,0.85,0.85
            thirdperson_lefthand:
              translation: 0,0.5,-2
              rotation: 0,90,-25
              scale: 0.85,0.85,0.85
    legacy_model:
      path: minecraft:item/custom/drill_selected
      generation:
        parent: minecraft:item/handheld
        textures:
          layer0: minecraft:item/custom/drill_selected
        display:
          thirdperson_righthand:
            translation: 0,0.5,-2
            rotation: 0,-90,25
            scale: 0.85,0.85,0.85
          thirdperson_lefthand:
            translation: 0,0.5,-2
            rotation: 0,90,-25
            scale: 0.85,0.85,0.85