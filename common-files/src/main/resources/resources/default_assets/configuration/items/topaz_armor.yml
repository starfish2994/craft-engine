items:
  default:topaz_helmet:
    template:
      - default:armor/topaz
    arguments:
      equipment_part: helmet
      equipment_slot: head
      equipment_material: topaz
    overrides:
      data:
        item_name: <!i><#FF8C00><lang:item.${__NAMESPACE__}.${equipment_material}_${equipment_part}>
        tooltip_style: minecraft:topaz
  default:topaz_chestplate:
