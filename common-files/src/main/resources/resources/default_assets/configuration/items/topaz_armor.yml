equipments:
  $$>=1.21.2:
    default:topaz:
      type: component
      humanoid: minecraft:entity/equipment/humanoid/topaz
      humanoid_leggings: minecraft:entity/equipment/humanoid_leggings/topaz
  $$<1.21.2:
    default:topaz:
      type: trim
      humanoid: minecraft:entity/equipment/humanoid/topaz
      humanoid_leggings: minecraft:entity/equipment/humanoid_leggings/topaz
recipes:
  default:topaz_helmet:
    type: shaped
    category: equipment
    pattern:
      - AAA
      - A A
    ingredients:
      A: default:topaz
    result:
      id: default:topaz_helmet
      count: 1
  default:topaz_chestplate:
    type: shaped
    category: equipment
    pattern:
      - A A
      - AAA
      - AAA
    ingredients:
      A: default:topaz
    result:
      id: default:topaz_chestplate
      count: 1
  default:topaz_leggings:
    type: shaped
    category: equipment
    pattern:
      - AAA
      - A A
      - A A
    ingredients:
      A: default:topaz
    result:
      id: default:topaz_leggings
      count: 1
  default:topaz_boots:
    type: shaped
    category: equipment
    pattern:
      - A A
      - A A
    ingredients:
      A: default:topaz
    result:
      id: default:topaz_boots
      count: 1
templates:
  default:armor/topaz:
    material: chainmail_${equipment_part}
    settings:
      tags:
        - default:${equipment_material}_tools
        - minecraft:trimmable_armor
      equipment:
        asset_id: ${__NAMESPACE__}:${equipment_material}
        $$>=1.21.2:
          slot: ${equipment_slot}
    model:
      template: default:model/armor_trim
      arguments:
        equipment_texture: minecraft:item/custom/${equipment_material}_${equipment_part}
  default:model/armor_trim:
    type: minecraft:select
    property: minecraft:trim_material
    fallback:
      path: ${__NAMESPACE__}:item/${equipment_material}_${equipment_part}
      generation:
        parent: minecraft:item/generated
        textures:
          layer0: ${equipment_texture}
    cases:
      - when: minecraft:quartz
        model:
          path: ${__NAMESPACE__}:item/${equipment_material}_${equipment_part}_quartz_trim
          generation:
            parent: minecraft:item/generated
            textures:
              layer0: ${equipment_texture}
              layer1: minecraft:trims/items/${equipment_part}_trim_quartz
      - when: minecraft:iron
        model:
          path: ${__NAMESPACE__}:item/${equipment_material}_${equipment_part}_iron_trim
          generation:
            parent: minecraft:item/generated
            textures:
              layer0: ${equipment_texture}
              layer1: minecraft:trims/items/${equipment_part}_trim_iron
      - when: minecraft:netherite
        model:
          path: ${__NAMESPACE__}:item/${equipment_material}_${equipment_part}_netherite_trim
