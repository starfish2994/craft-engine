templates:
  default:block_state/pillar:
    properties:
      axis:
        type: axis
        default: y
    appearances:
      axisY:
        auto_state: solid
        model:
          path: ${pillar_model}
          generation:
            parent: minecraft:block/cube_column
            textures:
              end: ${pillar_texture_top}
              side: ${pillar_texture_side}
      axisX:
        auto_state: solid
        model:
          x: 90
          y: 90
          path: ${pillar_model}_horizontal
          generation:
            parent: minecraft:block/cube_column_horizontal
            textures:
              end: ${pillar_texture_top}
              side: ${pillar_texture_side}
      axisZ:
        auto_state: solid
        model:
          x: 90
          path: ${pillar_model}_horizontal
          generation:
            parent: minecraft:block/cube_column_horizontal
            textures:
              end: ${pillar_texture_top}
              side: ${pillar_texture_side}
    variants:
      axis=x:
        appearance: axisX
      axis=y:
        appearance: axisY
      axis=z:
        appearance: axisZ
  default:block_state/__leaves__:
    properties:
      waterlogged:
        type: boolean
        default: false
      persistent:
        type: boolean
        default: true
      distance:
        type: int
        default: ${leaves_max_distance:-7}
        min: 1
        max: ${leaves_max_distance:-7}
    appearances:
      default:
        auto_state: ${auto_state}
        model:
          path: ${leaves_model:-"${leaves_texture}"}
          generation:
            parent: minecraft:block/${leaves_parent_model}
            textures:
              all: ${leaves_texture:-"${leaves_model}"}
      waterlogged:
        auto_state: waterlogged_${auto_state}
        model:
          path: ${leaves_model:-"${leaves_texture}"}
    variants:
      waterlogged=false:
        appearance: default
      waterlogged=true:
        appearance: waterlogged
        settings:
          resistance: 1200.0
          burnable: false
          fluid_state: water
  default:block_state/leaves:
    template: default:block_state/${leaves_tint_type}_leaves
    arguments:
      leaves_tint_type:
        type: condition
        condition: ${leaves_tintable:-false}
        on_true: tintable
        on_false: non_tintable
  default:block_state/tintable_leaves:
    template: default:block_state/__leaves__
    arguments:
      auto_state: tintable_leaves
      leaves_parent_model: leaves
  default:block_state/non_tintable_leaves:
    template: default:block_state/__leaves__
    arguments:
      auto_state: non_tintable_leaves
      leaves_parent_model: cube_all
