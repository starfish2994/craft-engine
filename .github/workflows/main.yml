name: Build CraftEngine Plugin

# 触发条件：推送代码或创建 Pull Request 时
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：拉取代码仓库
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 步骤3：给 Gradle 脚本添加执行权限
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 步骤4：配置 Git（如果需要）
      - name: Git config Set
        run: git config --global user.name "starfish2994"

      # 步骤5：清理 Gradle 缓存（解决二进制存储问题）
      - name: Clean Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/.tmp/

      # 步骤6：执行 Gradle 构建任务
      - name: Build with Gradle
        run: |
          ./gradlew clean
          ./gradlew build --no-daemon --refresh-dependencies --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

      # 步骤7：查找并上传构建产物
      - name: Find and upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: craftengine-plugin
          path: |
            **/build/libs/*.jar
            **/target/*.jar
          if-no-files-found: warn
